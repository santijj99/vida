server:
  port: 3000
  address: 192.168.100.18

spring:
  application:
    name: apirest

  datasource:
    url: jdbc:postgresql://localhost:5432/db_punto
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect